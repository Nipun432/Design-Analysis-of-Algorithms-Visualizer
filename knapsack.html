<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Knapsack Visualizer</title>
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#1e293b,#020617);
  color:#e2e8f0;
  text-align:center;
}

h1 { margin-top:20px }

.top-bar {
  display:flex;
  justify-content:flex-start;
  padding:10px 20px;
}

.top-bar button {
  background:#334155;
  color:white;
  border-radius:8px;
  padding:8px 14px;
  cursor:pointer;
  border:none;
  transition:0.2s;
}
.top-bar button:hover { background:#475569 }

.controls {
  margin:20px auto;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
}

input, button {
  padding:10px;
  border-radius:8px;
  border:none;
}

button {
  background:#6366f1;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover { background:#4f46e5 }

.items {
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:20px;
}

.item {
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  width:90px;
  transition:0.2s;
}

.selected {
  background:#22c55e !important;
  transform:scale(1.05);
}

.box {
  max-width:900px;
  margin:20px auto;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
  text-align:left;
  line-height:1.6;
}

table {
  border-collapse: collapse;
  margin:auto;
}

td {
  border:1px solid #334155;
  padding:6px;
  font-size:12px;
}</style>
</head>
<body>
<div class="top-bar">
  <button onclick="goHome()">🏠 Home</button>
</div>
<h1>Knapsack Visualizer</h1>

<div class="controls">
  <input id="weights" placeholder="Weights (e.g. 2,3,4)">
  <input id="values" placeholder="Values (e.g. 40,50,60)">
  <input id="capacity" placeholder="Capacity">

  <button onclick="renderItems()">Load Items</button>
  <button onclick="solveGreedy()">Greedy</button>
  <button onclick="solveDP()">DP</button>
</div>

<div class="items" id="items"></div>

<div class="box" id="explanation">
<h3>Explanation</h3>
<p>Select an approach to see explanation.</p>
</div>

<div class="box">
<h3>Result</h3>
<p id="result">-</p>
</div>

<div class="box">
<h3>DP Table</h3>
<div id="dpTable"></div>
</div>
<h5 style="position: absolute; bottom: -1; right: 20px;">MADE by :- <i>Nipun Garg & Nikhil Tiwari</i></h5>

<script>
function goHome() {
  window.location.href = "index.html";
}
function getInput(){
  let w = document.getElementById("weights").value.split(",").map(Number);
  let v = document.getElementById("values").value.split(",").map(Number);
  let cap = parseInt(document.getElementById("capacity").value);
  return {w,v,cap};
}

function renderItems(){
  let {w,v} = getInput();
  let container = document.getElementById("items");
  container.innerHTML = "";

  w.forEach((wt,i)=>{
    let div = document.createElement("div");
    div.className = "item";
    div.id = "item-"+i;
    div.innerHTML = `W:${wt}<br>V:${v[i]}`;
    container.appendChild(div);
  });
}

function solveGreedy(){
  let {w,v,cap} = getInput();
  renderItems();
  clearSelection();

  let items = w.map((wt,i)=>({wt,val:v[i],i,ratio:v[i]/wt}));
  items.sort((a,b)=>b.ratio-a.ratio);

  let total=0;

  for(let item of items){
    if(cap >= item.wt){
      cap -= item.wt;
      total += item.val;
      document.getElementById("item-"+item.i).classList.add("selected");
    }
  }

  document.getElementById("result").innerText = `Greedy Value: ${total}`;

document.getElementById("explanation").innerHTML = `
<h3>Greedy Knapsack</h3>
<p>Selects items based on highest value-to-weight ratio.</p>
<p><b>Time:</b> O(n log n)</p>
<p><b>Note:</b> Does not guarantee optimal solution for 0/1 Knapsack.</p>`;

  document.getElementById("dpTable").innerHTML = "";
}

function solveDP(){
  let {w,v,cap} = getInput();
  renderItems();
  clearSelection();

  let n = w.length;
  let dp = Array(n+1).fill().map(()=>Array(cap+1).fill(0));

  for(let i=1;i<=n;i++){
    for(let j=1;j<=cap;j++){
      if(w[i-1] <= j)
        dp[i][j] = Math.max(v[i-1]+dp[i-1][j-w[i-1]], dp[i-1][j]);
      else
        dp[i][j] = dp[i-1][j];
    }
  }

  // highlight chosen items (backtrack)
  let j = cap;
  for(let i=n;i>0;i--){
    if(dp[i][j] !== dp[i-1][j]){
      document.getElementById("item-"+(i-1)).classList.add("selected");
      j -= w[i-1];
    }
  }

  document.getElementById("result").innerText = `Optimal Value: ${dp[n][cap]}`;

document.getElementById("explanation").innerHTML = `
<h3>0/1 Knapsack (Dynamic Programming)</h3>
<p>Builds solution using subproblems stored in a table.</p>
<p><b>Time:</b> O(n × capacity)</p>
<p><b>Guarantee:</b> Always gives optimal solution.</p>`;

  // render DP table
  let html = "<table>";
  for(let i=0;i<=n;i++){
    html += "<tr>";
    for(let j=0;j<=cap;j++){
      html += `<td>${dp[i][j]}</td>`;
    }
    html += "</tr>";
  }
  html += "</table>";

  document.getElementById("dpTable").innerHTML = html;
}
function clearSelection(){
  document.querySelectorAll(".item").forEach(el=>{
    el.classList.remove("selected");
  });
}

</script>

</body>
</html>
