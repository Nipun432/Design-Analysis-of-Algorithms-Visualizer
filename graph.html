<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Graph Visualizer (BFS / DFS)</title>
<style>body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#1e293b,#020617);
  color:#e2e8f0;
  text-align:center;
}

h1 { margin-top:20px }

.top-bar {
  display:flex;
  justify-content:flex-start;
  padding:10px 20px;
}

.top-bar button {
  background:#334155;
  color:white;
  border-radius:8px;
  padding:8px 14px;
  cursor:pointer;
  border:none;
  transition:0.2s;
}
.top-bar button:hover { background:#475569 }

.controls {
  margin:20px auto;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
}

button {
  padding:10px;
  border-radius:8px;
  border:none;
  background:#6366f1;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover { background:#4f46e5 }

button:disabled {
  opacity:.5;
  cursor:not-allowed;
}

#canvas {
  border:1px solid #334155;
  margin-top:20px;
  border-radius:10px;
  background:#020617;
}

.legend {
  margin-top:15px;
}

.legend span {
  margin-right:15px;
}

.box {
  max-width:900px;
  margin:20px auto;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
  text-align:left;
  line-height:1.6;
}

.title {
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}
.stats {
  margin-top:15px;
  display:flex;
  justify-content:center;
  gap:40px;
  font-weight:500;
}
</style>
</head>
<body>
<div class="top-bar">
  <button onclick="goHome()">🏠 Home</button>
</div>
<h1>Graph Visualizer (Tree Mode)</h1>

<div class="controls">
  <button id="addBtn" onclick="addNode()">Add Node</button>
  <button id="bfsBtn" onclick="startBFS()">BFS</button>
  <button id="dfsBtn" onclick="startDFS()">DFS</button>
  <button id="stopBtn" onclick="stopTraversal()" disabled>Stop</button>
  <button id="clearBtn" onclick="clearGraph()">Clear</button>
</div>

<div class="stats">
  <p id="startNodeDisplay">Start Node: -</p>
  <p id="stepDisplay">Step: -</p>
</div>

<div class="legend">
  <span>🟢 Default</span>
  <span>🟡 Discovered</span>
  <span>🔴 Processing</span>
  <span>🔵 Visited</span>
</div>

<canvas id="canvas" width="700" height="450"></canvas>

<div class="box" id="explanation">
<h3>Algorithm Explanation</h3>
<p>Select BFS or DFS to see explanation.</p>
</div>

<div class="box">
<h3>Traversal Output</h3>
<p id="output">-</p>
</div>
  <h5 style="position: absolute; bottom: -1; right: 20px;">MADE by :- <i>Nipun Garg & Nikhil Tiwari</i></h5>
<script>
  function goHome() {
  window.location.href = "index.html";
}
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let nodes = [];
let edges = [];
let isRunning = false;
let result = [];
let levels = {};
let step = 0;

function setControls(state){
  document.getElementById("addBtn").disabled = state;
  document.getElementById("bfsBtn").disabled = state;
  document.getElementById("dfsBtn").disabled = state;
  document.getElementById("stopBtn").disabled = !state;
  document.getElementById("clearBtn").disabled = state;
}

function draw(highlightEdge=null){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  edges.forEach(e => {
    let a = nodes[e[0]];
    let b = nodes[e[1]];
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = (highlightEdge && highlightEdge[0]===e[0] && highlightEdge[1]===e[1]) ? "yellow" : "white";
    ctx.lineWidth = (highlightEdge && highlightEdge[0]===e[0] && highlightEdge[1]===e[1]) ? 3 : 1;
    ctx.stroke();
  });

  nodes.forEach((n,i)=>{
    ctx.beginPath();
    ctx.arc(n.x, n.y, 18, 0, Math.PI*2);
    ctx.fillStyle = n.color || "green";
    ctx.fill();

    ctx.fillStyle = "white";
    ctx.fillText(i, n.x-5, n.y+5);
  });
}

function resetColors(){ nodes.forEach(n => n.color = "green"); }

function clearGraph(){
  isRunning=false;
  nodes=[]; edges=[]; levels={}; result=[]; step=0;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  document.getElementById("output").innerText="-";
  document.getElementById("startNodeDisplay").innerText="Start Node: -";
  document.getElementById("stepDisplay").innerText="Step: -";
  setControls(false);
}

function addNode(){
  let index = nodes.length;
  let level = Math.floor(Math.log2(index + 1));
  if(!levels[level]) levels[level]=0;

  let pos = levels[level]++;
  let spacingX = canvas.width / (Math.pow(2, level) + 1);
  let x = spacingX * (pos + 1);
  let y = 80 + level * 80;

  nodes.push({x,y,color:"green"});

  if(index>0){
    let parent = Math.floor((index-1)/2);
    edges.push([parent,index]);
  }

  draw();
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function getNeighbors(v){
  let list=[];
  for(let e of edges){
    if(e[0]===v) list.push(e[1]);
    else if(e[1]===v) list.push(e[0]);
  }
  return list;
}

function stopTraversal(){ isRunning=false; }

function updateExplanation(type){
  const exp = document.getElementById("explanation");

  if(type === "bfs"){
    exp.innerHTML = `
    <div class="title">Breadth First Search (BFS)</div>
    <p>BFS explores nodes level by level using a <b>queue</b>.</p>
    <ul>
      <li>Start from root node</li>
      <li>Visit all neighbors first</li>
      <li>Move level by level</li>
    </ul>
    <p><b>Time:</b> O(V + E)</p>
    <p><b>Space:</b> O(V)</p>`;
  } else {
    exp.innerHTML = `
    <div class="title">Depth First Search (DFS)</div>
    <p>DFS explores as deep as possible using recursion/stack.</p>
    <ul>
      <li>Start from root</li>
      <li>Go deep into one branch</li>
      <li>Backtrack and explore others</li>
    </ul>
    <p><b>Time:</b> O(V + E)</p>
    <p><b>Space:</b> O(V)</p>`;
  }
}

async function startBFS(){
  if(nodes.length===0) return alert("Add nodes first");
  isRunning=true; result=[]; step=0;
  setControls(true); resetColors(); draw(); updateExplanation("bfs");

  let start=0;
  document.getElementById("startNodeDisplay").innerText="Start Node: "+start;

  let visited=new Array(nodes.length).fill(false);
  let queue=[start]; visited[start]=true;

  while(queue.length && isRunning){
    let v=queue.shift();
    result.push(v);
    step++;
    document.getElementById("stepDisplay").innerText="Step: "+step+" (Visiting "+v+")";

    nodes[v].color="red";
    draw(); await sleep(500);

    for(let next of getNeighbors(v)){
      if(!visited[next]){
        visited[next]=true;
        nodes[next].color="yellow";
        queue.push(next);
      }
    }

    nodes[v].color="blue";
    draw();
  }

  document.getElementById("output").innerText=result.join(" → ");
  isRunning=false; setControls(false);
}

async function startDFS(){
  updateExplanation("dfs");
  if(nodes.length===0) return alert("Add nodes first");
  isRunning=true; result=[]; step=0;
  setControls(true); resetColors(); draw();

  let start=0;
  document.getElementById("startNodeDisplay").innerText="Start Node: "+start;

  let visited=new Array(nodes.length).fill(false);

  async function dfs(v){
    if(!isRunning) return;
    visited[v]=true;
    result.push(v);
    step++;
    document.getElementById("stepDisplay").innerText="Step: "+step+" (Visiting "+v+")";

    nodes[v].color="red";
    draw(); await sleep(500);

    for(let next of getNeighbors(v)){
      if(!visited[next]){
        nodes[next].color="yellow";
        draw(); await sleep(300);
        await dfs(next);
      }
    }

    nodes[v].color="blue";
    draw();
  }

  await dfs(start);

  document.getElementById("output").innerText=result.join(" → ");
  isRunning=false; setControls(false);
}

</script>

</body>
</html>
